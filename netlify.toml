[build]
  command = "next build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "22"
  NEXT_TELEMETRY_DISABLED = "1"

# The official Next.js runtime handles SSR/static rendering and image
# optimisation. Netlify Forms detection runs automatically at deploy time
# using the static skeleton in public/__forms.html.
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Ensure the service worker is always revalidated and allowed root scope.
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Service-Worker-Allowed = "/"
