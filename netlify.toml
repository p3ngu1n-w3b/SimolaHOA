[build]
  command = "prisma generate && prisma db push --accept-data-loss && next build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "22"
  NEXT_TELEMETRY_DISABLED = "1"

# The official Next.js runtime is auto-installed by Netlify and handles
# serverless functions, edge middleware and image optimisation.
[[plugins]]
  package = "@netlify/plugin-nextjs"
