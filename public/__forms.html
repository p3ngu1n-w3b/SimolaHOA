<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Simola HOA — form registry</title>
    <meta name="robots" content="noindex" />
  </head>
  <body>
    <!--
      Static skeletons so Netlify can detect each form at build time.
      The React components submit to these forms via fetch("/__forms.html").
      Every field name used by a component MUST appear in its skeleton here.
    -->

    <!-- Report an Issue -->
    <form name="report-an-issue" data-netlify="true" netlify-honeypot="bot-field" enctype="multipart/form-data" hidden>
      <input type="hidden" name="form-name" value="report-an-issue" />
      <input name="bot-field" />
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <input type="text" name="propertyNumber" />
      <input type="text" name="category" />
      <textarea name="description"></textarea>
      <input type="text" name="location" />
      <input type="file" name="photo" />
      <input type="file" name="photo_2" />
      <input type="file" name="photo_3" />
    </form>

    <!-- Domestic Worker Registration -->
    <form name="domestic-worker-registration" data-netlify="true" netlify-honeypot="bot-field" enctype="multipart/form-data" hidden>
      <input type="hidden" name="form-name" value="domestic-worker-registration" />
      <input name="bot-field" />
      <input type="text" name="residentName" />
      <input type="text" name="propertyNumber" />
      <input type="text" name="workerName" />
      <input type="text" name="idNumber" />
      <input type="tel" name="contactNumber" />
      <input type="file" name="photo" />
    </form>

    <!-- Contractor Registration -->
    <form name="contractor-registration" data-netlify="true" netlify-honeypot="bot-field" enctype="multipart/form-data" hidden>
      <input type="hidden" name="form-name" value="contractor-registration" />
      <input name="bot-field" />
      <input type="text" name="companyName" />
      <input type="text" name="contactPerson" />
      <input type="email" name="contactEmail" />
      <input type="tel" name="contactPhone" />
      <input type="text" name="vehicleDetails" />
      <textarea name="staffList"></textarea>
      <input type="text" name="workStartDate" />
      <input type="text" name="workEndDate" />
      <input type="file" name="document" />
      <input type="file" name="document_2" />
    </form>

    <!-- Contact -->
    <form name="contact" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="contact" />
      <input name="bot-field" />
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <input type="text" name="subject" />
      <textarea name="message"></textarea>
    </form>
  </body>
</html>
